<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autorizador de Pedidos</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      margin: 15px;
    }
    .search-box {
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      box-sizing: border-box;
    }
    button {
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    .card {
      border: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
      background-color: var(--tg-theme-secondary-bg-color, #f9f9f9);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .item-row {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    .item-detail { font-size: 0.9em; color: var(--tg-theme-hint-color, #666); }
    .qty-inputs { display: flex; gap: 10px; margin-top: 5px; }
    .qty-inputs div { flex: 1; }
  </style>
</head>
<body>

  <h3>📋 Autorización de Pedidos</h3>
  
  <div class="search-box">
    <label for="idPedido">Número de Solicitud:</label>
    <input type="number" id="idPedido" placeholder="Ej. 598123">
    <button onclick="cargarPedido()" style="margin-top: 10px;">🔍 Buscar Pedido</button>
  </div>

  <div id="contenedorPedido"></div>

  <script>
    // Inicializar Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Expandir la ventana al máximo

    // REPLAZA CON TU URL DE APPS SCRIPT
    const WEB_APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUÍ"; 

    let pedidoActual = null;

    async function cargarPedido() {
      const id = document.getElementById('idPedido').value;
      if(!id) return alert("Ingresa un ID");
      
      document.getElementById('contenedorPedido').innerHTML = "<p>Cargando datos del pedido...</p>";
      
      try {
        const response = await fetch(`${WEB_APP_URL}?action=obtenerPedido&id=${id}`);
        pedidoActual = await response.json();
        
        if (!pedidoActual.items || pedidoActual.items.length === 0) {
          document.getElementById('contenedorPedido').innerHTML = "<p>❌ No se encontraron ítems pendientes para este ID.</p>";
          tg.MainButton.hide();
          return;
        }
        
        renderizarPedido();
      } catch (error) {
        document.getElementById('contenedorPedido').innerHTML = "<p>❌ Error al conectar con el servidor.</p>";
      }
    }

    function renderizarPedido() {
      let html = `<div class="card"><h4>Solicitud: ${pedidoActual.id}</h4>`;
      
      pedidoActual.items.forEach((item, index) => {
        html += `
          <div class="item-row">
            <strong>${item.codigo}</strong>
            <div class="item-detail">${item.detalle}</div>
            <div class="qty-inputs">
              <div>
                <label style="font-size:0.8em;">Solicitado</label>
                <input type="number" value="${item.solicitado}" disabled>
              </div>
              <div>
                <label style="font-size:0.8em;">Autorizar</label>
                <input type="number" id="autorizado-${index}" data-codigo="${item.codigo}" value="${item.solicitado}">
              </div>
            </div>
          </div>
        `;
      });
      
      html += `</div>`;
      document.getElementById('contenedorPedido').innerHTML = html;
      
      // Mostrar el botón nativo de Telegram abajo para Guardar
      tg.MainButton.setText("✅ AUTORIZAR PEDIDO");
      tg.MainButton.show();
      tg.MainButton.onClick(guardarAutorizacion);
    }

    async function guardarAutorizacion() {
      tg.MainButton.showProgress();
      
      const itemsAEnviar = pedidoActual.items.map((item, index) => {
        return {
          codigo: item.codigo,
          cantidad: document.getElementById(`autorizado-${index}`).value
        };
      });

      const payload = {
        id: pedidoActual.id,
        items: itemsAEnviar
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const resultado = await response.json();
        
        if(resultado.success) {
          alert("🎉 " + resultado.message);
          document.getElementById('contenedorPedido').innerHTML = "";
          document.getElementById('idPedido').value = "";
          tg.MainButton.hide();
        } else {
          alert("⚠️ " + resultado.message);
        }
      } catch (error) {
        alert("❌ Error al procesar el guardado.");
      } finally {
        tg.MainButton.hideProgress();
      }
    }
  </script>
</body>
</html>
