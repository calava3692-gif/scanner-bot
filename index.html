<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Telegram</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Usamos los colores del tema de Telegram del usuario */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--tg-theme-button-color, #3390ec) !important;
        }

        .btn-cancelar {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--tg-theme-button-text-color, #ffffff);
            background-color: #d9534f; /* Rojo para cancelar */
            border: none;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <h2>Apunta la cámara al código QR / Serie</h2>
    
    <div id="reader"></div>

    <button class="btn-cancelar" onclick="cerrarWebApp()">Cancelar</button>

    <script>
        // 1. Inicializar la WebApp de Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Forzar a que se abra en pantalla completa

        // 2. Función que se ejecuta cuando el escáner lee algo con éxito
        function onScanSuccess(decodedText, decodedResult) {
            // Detener el escáner para evitar envíos múltiples por accidente
            html5QrcodeScanner.clear();
            
            // Enviar el texto leído de vuelta al bot de Telegram
            tg.sendData(decodedText);
        }

        // Función que se ejecuta en caso de error (suele fallar constantemente mientras enfoca, es normal)
        function onScanFailure(error) {
            // Se puede dejar vacío para no saturar la consola
        }

        // 3. Configurar e iniciar el escáner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, // Cuadros por segundo (balance entre rendimiento y rapidez)
                qrbox: { width: 250, height: 250 }, // Tamaño del cuadro guía
                supportedScanTypes: [
                    Html5QrcodeScanType.SCAN_TYPE_CAMERA // Forzar solo uso de cámara (ocultar subida de archivo si se desea)
                ]
            },
            /* verbose= */ false
        );
        
        // Renderizar la cámara en el div con id "reader"
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // 4. Función para cerrar manualmente si el usuario se arrepiente
        function cerrarWebApp() {
            tg.close();
        }
    </script>

</body>
</html>
