<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        #reader {
            width: 100%; max-width: 400px; border-radius: 10px;
            overflow: hidden; border: 2px solid var(--tg-theme-button-color, #3390ec);
        }
        .btn-cancelar {
            margin-top: 20px; padding: 12px 24px; font-size: 1rem;
            font-weight: bold; color: var(--tg-theme-button-text-color, #ffffff);
            background-color: #d9534f; border: none; border-radius: 8px;
            width: 100%; max-width: 400px;
        }
    </style>
</head>
<body>

    <h2 id="status">Iniciando cámara trasera...</h2>
    <div id="reader"></div>
    <button class="btn-cancelar" onclick="cerrarWebApp()">Cancelar</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        let escaneado = false;

        // Iniciar forzando la cámara trasera
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                if (!escaneado) {
                    escaneado = true;
                    document.getElementById('status').innerText = "¡Código leído!";
                    // Detener cámara y enviar a Telegram
                    html5QrCode.stop().then(() => {
                        tg.sendData(decodedText);
                    });
                }
            },
            (errorMessage) => {
                // Silenciar errores de enfoque para no saturar consola
            }
        ).catch((err) => {
            document.getElementById('status').innerText = "Error al abrir la cámara trasera.";
            console.error(err);
        });

        function cerrarWebApp() {
            tg.close();
        }
    </script>

</body>
</html>
