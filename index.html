<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autorizador de Pedidos</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      margin: 15px;
    }
    .search-box { margin-bottom: 20px; }
    input, button {
      width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px;
      border: 1px solid var(--tg-theme-hint-color, #ccc); box-sizing: border-box; font-size: 16px;
    }
    input { background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
    button {
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff); font-weight: bold; border: none; cursor: pointer;
    }
    .card {
      border: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
      background-color: var(--tg-theme-secondary-bg-color, #f9f9f9); padding: 15px; border-radius: 10px; margin-bottom: 10px;
    }
    .item-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 0, 0, 0.1); }
    .item-detail { font-size: 0.9em; color: var(--tg-theme-hint-color, #666); }
    .qty-inputs { display: flex; gap: 10px; margin-top: 5px; }
    .qty-inputs div { flex: 1; }
    .status-msg { text-align: center; padding: 10px; color: var(--tg-theme-hint-color, #666); }
    .tecnico-info { font-size: 0.95em; color: var(--tg-theme-hint-color, #666); margin: 5px 0 15px 0; }
  </style>
</head>
<body>

  <h3>📋 Autorización de Pedidos</h3>
  
  <div class="search-box" id="bloqueBusqueda">
    <label for="idPedido">Escribe o selecciona un ID Pendiente:</label>
    <input type="text" id="idPedido" list="listaPendientes" placeholder="Buscando pedidos pendientes..." autocomplete="off">
    <datalist id="listaPendientes"></datalist>
    <button onclick="ejecutarBusquedaManual()" style="margin-top: 10px;">🔍 Buscar Pedido</button>
  </div>

  <div id="contenedorPedido"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyX3fYLX951KbOe7rYzUf13IltukO7O4dI9oKWh0nQSBiSuU2v_L7DeW77yuX7oonxpfw/exec"; 

    let pedidoActual = null;

    document.addEventListener("DOMContentLoaded", analizarEntrada);

    function analizarEntrada() {
      const urlParams = new URLSearchParams(window.location.search);
      const idParam = urlParams.get('id');
      
      if (idParam) {
        document.getElementById('bloqueBusqueda').style.display = 'none';
        cargarPedidoIndividual(idParam);
      } else {
        obtenerPedidosPendientes();
      }
    }

    async function obtenerPedidosPendientes() {
      const datalist = document.getElementById('listaPendientes');
      const input = document.getElementById('idPedido');
      try {
        const response = await fetch(`${WEB_APP_URL}?action=listarPendientes`);
        const ids = await response.json();
        if (Array.isArray(ids) && ids.length > 0) {
          datalist.innerHTML = "";
          ids.forEach(id => {
            let option = document.createElement('option');
            option.value = id;
            datalist.appendChild(option);
          });
          input.placeholder = "Escribe para filtrar o selecciona...";
        } else {
          input.placeholder = "No hay pedidos pendientes hoy ⚡";
        }
      } catch (error) {
        input.placeholder = "Error al cargar sugerencias.";
      }
    }

    function ejecutarBusquedaManual() {
      const id = document.getElementById('idPedido').value.trim();
      if(!id) return alert("Por favor escribe un ID válido.");
      cargarPedidoIndividual(id);
    }

    async function cargarPedidoIndividual(id) {
      document.getElementById('contenedorPedido').innerHTML = "<div class='status-msg'>⏳ Cargando detalles del pedido...</div>";
      tg.MainButton.hide();
      
      try {
        const response = await fetch(`${WEB_APP_URL}?action=obtenerPedido&id=${id}`);
        pedidoActual = await response.json();
        
        if (!pedidoActual.items || pedidoActual.items.length === 0) {
          document.getElementById('contenedorPedido').innerHTML = "<div class='status-msg'>❌ No se encontraron ítems pendientes para este ID.</div>";
          return;
        }
        renderizarPedido();
      } catch (error) {
        document.getElementById('contenedorPedido').innerHTML = "<div class='status-msg'>❌ Error al conectar con Google Sheets.</div>";
      }
    }

    function renderizarPedido() {
      let html = `
        <div class="card">
          <h4 style="margin: 0;">Solicitud: ${pedidoActual.id}</h4>
          <div class="tecnico-info">👤 <strong>Técnico:</strong> ${pedidoActual.usuario || 'No especificado'}</div>
      `;
      
      pedidoActual.items.forEach((item, index) => {
        html += `
          <div class="item-row">
            <strong>${item.codigo}</strong>
            <div class="item-detail">${item.detalle}</div>
            <div class="qty-inputs">
              <div>
                <label style="font-size:0.8em; color: gray;">Solicitado</label>
                <input type="number" value="${item.solicitado}" disabled style="background-color: rgba(0,0,0,0.05);">
              </div>
              <div>
                <label style="font-size:0.8em; font-weight: bold;">Autorizar</label>
                <input type="number" id="autorizado-${index}" value="${item.solicitado}">
              </div>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      document.getElementById('contenedorPedido').innerHTML = html;
      
      tg.MainButton.setText("✅ AUTORIZAR PEDIDO");
      tg.MainButton.show();
      tg.MainButton.onClick(guardarAutorizacion);
    }

    async function guardarAutorizacion() {
      tg.MainButton.showProgress();
      const itemsAEnviar = pedidoActual.items.map((item, index) => {
        return {
          codigo: item.codigo,
          cantidad: document.getElementById(`autorizado-${index}`).value // <-- CORREGIDO: Volvió a "cantidad"
        };
      });

      const payload = { id: pedidoActual.id, items: itemsAEnviar };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const resultado = await response.json();
        
        if(resultado.success) {
          alert("🎉 " + resultado.message);
          document.getElementById('contenedorPedido').innerHTML = "<div class='status-msg'>✅ Procesado correctamente. Puedes cerrar esta ventana.</div>";
          tg.MainButton.hide();
        } else {
          alert("⚠️ " + resultado.message);
          tg.MainButton.hideProgress();
        }
      } catch (error) {
        alert("❌ Error de red al guardar.");
        tg.MainButton.hideProgress();
      }
    }
  </script>
</body>
</html>
